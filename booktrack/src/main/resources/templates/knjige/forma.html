<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Forma knjige</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h1 th:text="${title}"></h1>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{${action}}" th:object="${knjigaRequest}" method="post">

        <div class="mb-3">
            <label for="naslov" class="form-label">Naslov</label>
            <input type="text" id="naslov" th:field="*{naslov}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('naslov')}" th:errors="*{naslov}"></div>
        </div>

        <div class="mb-3">
            <label for="autor" class="form-label">Autor</label>
            <input type="text" id="autor" th:field="*{autor}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('autor')}" th:errors="*{autor}"></div>
        </div>

        <div class="mb-3">
            <label for="godinaIzdanja" class="form-label">Godina izdanja</label>
            <input type="number" id="godinaIzdanja" th:field="*{godinaIzdanja}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('godinaIzdanja')}" th:errors="*{godinaIzdanja}"></div>
        </div>

        <div class="mb-3">
            <label for="isbn" class="form-label">ISBN</label>
            <input type="text" id="isbn" th:field="*{isbn}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>
        </div>

        <div class="mb-3">
            <label for="kategorijaId" class="form-label">Kategorija</label>
            <select id="kategorijaId" th:field="*{kategorijaId}" class="form-select">
                <option value="">Odaberi kategoriju</option>
                <option th:each="kategorija : ${kategorije}"
                        th:value="${kategorija.id}"
                        th:text="${kategorija.naziv}">
                </option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('kategorijaId')}" th:errors="*{kategorijaId}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Spremi</button>
        <a href="/knjige" class="btn btn-secondary">Odustani</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
