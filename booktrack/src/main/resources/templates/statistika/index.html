<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Statistika</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Statistika knjižnice</h1>
        <a href="/" class="btn btn-secondary">Natrag na početnu</a>
    </div>

    <div class="row g-4 mb-5">

        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Ukupno knjiga</h5>
                    <h2 th:text="${brojKnjiga}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Dostupne knjige</h5>
                    <h2 th:text="${brojDostupnih}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Posuđene knjige</h5>
                    <h2 th:text="${brojPosudenih}"></h2>
                </div>
            </div>
        </div>

    </div>

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Broj knjiga po kategorijama</h5>
                    <canvas id="knjigePoKategorijamaChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Broj posudbi po kategorijama</h5>
                    <canvas id="posudbePoKategorijamaChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-md-6 mx-auto">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Dostupne i posuđene knjige</h5>
                    <canvas id="dostupnostChart"></canvas>
                </div>
            </div>
        </div>

    </div>

</div>

<script th:inline="javascript">
    const knjigePoKategorijama = /*[[${knjigePoKategorijama}]]*/ {};
    const posudbePoKategorijama = /*[[${posudbePoKategorijama}]]*/ {};

    const brojDostupnih = /*[[${brojDostupnih}]]*/ 0;
    const brojPosudenih = /*[[${brojPosudenih}]]*/ 0;

    const knjigeLabels = Object.keys(knjigePoKategorijama);
    const knjigeData = Object.values(knjigePoKategorijama);

    const posudbeLabels = Object.keys(posudbePoKategorijama);
    const posudbeData = Object.values(posudbePoKategorijama);

    new Chart(document.getElementById('knjigePoKategorijamaChart'), {
        type: 'bar',
        data: {
            labels: knjigeLabels,
            datasets: [{
                label: 'Broj knjiga',
                data: knjigeData
            }]
        }
    });

    new Chart(document.getElementById('posudbePoKategorijamaChart'), {
        type: 'bar',
        data: {
            labels: posudbeLabels,
            datasets: [{
                label: 'Broj posudbi',
                data: posudbeData
            }]
        }
    });

    new Chart(document.getElementById('dostupnostChart'), {
        type: 'pie',
        data: {
            labels: ['Dostupne', 'Posuđene'],
            datasets: [{
                data: [brojDostupnih, brojPosudenih]
            }]
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
