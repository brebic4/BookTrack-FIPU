<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BookTrack Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <div class="text-center mb-5">
        <h1>📚 BookTrack</h1>
        <p class="lead">
            Sustav za upravljanje mini knjižnicom
        </p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Ukupno knjiga</h5>
                    <h2 th:text="${brojKnjiga}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Dostupne knjige</h5>
                    <h2 th:text="${brojDostupnih}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Posuđene knjige</h5>
                    <h2 th:text="${brojPosudenih}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Kategorije</h5>
                    <h2 th:text="${brojKategorija}"></h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Aktivne posudbe</h5>
                    <h2 th:text="${brojAktivnihPosudbi}"></h2>
                </div>
            </div>
        </div>

    </div>

    <hr class="my-5">

    <div class="row g-3">

        <div class="col-md-4">
            <a href="/knjige" class="btn btn-primary w-100">
                Upravljanje knjigama
            </a>
        </div>

        <div class="col-md-4">
            <a href="/kategorije" class="btn btn-success w-100">
                Upravljanje kategorijama
            </a>
        </div>

        <div class="col-md-4">
            <a href="/posudbe" class="btn btn-warning w-100">
                Upravljanje posudbama
            </a>
        </div>

    </div>

</div>

</body>
</html>
