<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Posudbe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Posudbe</h1>
        <a href="/posudbe/nova" class="btn btn-primary">Nova posudba</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-bordered table-striped align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Knjiga</th>
            <th>Korisnik</th>
            <th>Email</th>
            <th>Datum posudbe</th>
            <th>Rok povrata</th>
            <th>Datum povrata</th>
            <th>Status</th>
            <th>Akcije</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="posudba : ${posudbe}">
            <td th:text="${posudba.id}"></td>
            <td>
                <a th:href="@{/knjige/{id}(id=${posudba.knjiga.id})}"
                   th:text="${posudba.knjiga.naslov}">
                </a>
            </td>
            <td th:text="${posudba.imeKorisnika}"></td>
            <td th:text="${posudba.emailKorisnika}"></td>
            <td th:text="${posudba.datumPosudbe}"></td>
            <td th:text="${posudba.rokPovrata}"></td>
            <td th:text="${posudba.datumPovrata != null ? posudba.datumPovrata : '-'}"></td>

            <td>
                <span th:if="${posudba.status.name() == 'VRACENA'}" class="badge bg-success">Vraćena</span>

                <span th:if="${posudba.status.name() == 'AKTIVNA' and !posudbaService.kasni(posudba)}"
                      class="badge bg-primary">Aktivna</span>

                <span th:if="${posudba.status.name() == 'AKTIVNA' and posudbaService.kasni(posudba)}"
                      class="badge bg-danger">Kasni</span>
            </td>

            <td>
                <form th:if="${posudba.status.name() == 'AKTIVNA'}"
                      th:action="@{/posudbe/{id}/vrati(id=${posudba.id})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit"
                            class="btn btn-sm btn-success"
                            onclick="return confirm('Potvrditi povrat knjige?')">
                        Vrati knjigu
                    </button>
                </form>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(posudbe)}">
            <td colspan="9" class="text-center text-muted">
                Trenutno nema evidentiranih posudbi.
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Natrag na početnu</a>
</div>

</body>
</html>
