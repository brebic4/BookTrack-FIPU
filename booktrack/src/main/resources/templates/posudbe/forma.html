<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova posudba</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h1>Nova posudba</h1>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/posudbe}" th:object="${posudbaRequest}" method="post">

        <div class="mb-3">
            <label for="knjigaId" class="form-label">Knjiga</label>
            <select id="knjigaId" th:field="*{knjigaId}" class="form-select">
                <option value="">Odaberi knjigu</option>
                <option th:each="knjiga : ${knjige}"
                        th:value="${knjiga.id}"
                        th:text="${knjiga.naslov + ' - ' + knjiga.autor + ' (' + knjiga.kategorija.naziv + ')'}"
                        th:disabled="${!knjiga.dostupna}">
                </option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('knjigaId')}" th:errors="*{knjigaId}"></div>
        </div>

        <div class="mb-3">
            <label for="imeKorisnika" class="form-label">Ime i prezime korisnika</label>
            <input type="text" id="imeKorisnika" th:field="*{imeKorisnika}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('imeKorisnika')}" th:errors="*{imeKorisnika}"></div>
        </div>

        <div class="mb-3">
            <label for="emailKorisnika" class="form-label">Email korisnika</label>
            <input type="email" id="emailKorisnika" th:field="*{emailKorisnika}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('emailKorisnika')}" th:errors="*{emailKorisnika}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Spremi posudbu</button>
        <a href="/posudbe" class="btn btn-secondary">Odustani</a>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
