<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Forma kategorije</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h1 th:text="${title}"></h1>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{${action}}" th:object="${kategorijaRequest}" method="post">

        <div class="mb-3">
            <label for="naziv" class="form-label">Naziv</label>
            <input type="text" id="naziv" th:field="*{naziv}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('naziv')}" th:errors="*{naziv}"></div>
        </div>

        <div class="mb-3">
            <label for="opis" class="form-label">Opis</label>
            <textarea id="opis" th:field="*{opis}" class="form-control" rows="4"></textarea>
            <div class="text-danger" th:if="${#fields.hasErrors('opis')}" th:errors="*{opis}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Spremi</button>
        <a href="/kategorije" class="btn btn-secondary">Odustani</a>
    </form>
</div>

</body>
</html>
