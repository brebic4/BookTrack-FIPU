<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kategorije</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Kategorije</h1>
        <a href="/kategorije/nova" class="btn btn-primary">Dodaj kategoriju</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Naziv</th>
            <th>Opis</th>
            <th>Broj knjiga</th>
            <th>Akcije</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="kategorija : ${kategorije}">
            <td th:text="${kategorija.id}"></td>
            <td th:text="${kategorija.naziv}"></td>
            <td th:text="${kategorija.opis}"></td>
            <td th:text="${kategorija.knjige.size()}"></td>
            <td>
                <a th:href="@{/kategorije/{id}/uredi(id=${kategorija.id})}" class="btn btn-sm btn-warning">
                    Uredi
                </a>

                <form th:action="@{/kategorije/{id}/obrisi(id=${kategorija.id})}"
                      method="post"
                      style="display:inline;">
                    <button type="submit"
                            class="btn btn-sm btn-danger"
                            onclick="return confirm('Jeste li sigurni da želite obrisati kategoriju?')">
                        Obriši
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">Natrag na početnu</a>
</div>

</body>
</html>
